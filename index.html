<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daytona Playground</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-container" class="container">
    <h1>Octocat Playground</h1>
    <div id="login-form">
        <input type="text" id="username" placeholder="Email or username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-button">Sign in</button>
        <div id="login-error" class="error"></div>
    </div>
</div>

<div id="main-container" class="container hidden">
    <h1>Welcome to Daytona Playground</h1>
    <button id="logout-button" class="link-button">Log out</button>
    <div id="session-info" class="session-info"></div>
    <div id="content-editor">
        <h2>Edit Playground</h2>
        <textarea id="playground-content" rows="6" placeholder="Write something interesting..."></textarea><br>
        <button id="save-content">Save with Game ID</button>
        <div id="saved-message"></div>
        <h3>Saved games</h3>
        <ul id="saved-list"></ul>
    </div>

    <div id="store-section">
        <h2>CGames Store</h2>
        <img id="store-icon" src="asset_5eNEvx5nGhzsb6MVArATAbGj.jpg" alt="Store Icon" class="store-icon">
        <div id="store" class="hidden">
            <h3>Upload Game (only for logged-in uploaders)</h3>
            <input type="file" id="game-file" accept="*/*"><br>
            <button id="upload-button">Upload</button>
            <div id="upload-error" class="error"></div>
            <h3>Available Games</h3>
            <ul id="games-list"></ul>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
